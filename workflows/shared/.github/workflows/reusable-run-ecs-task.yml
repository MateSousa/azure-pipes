# Reusable workflow: Build and register an ECS scheduled task
#
# This builds the Docker image, pushes to ECR, and updates the task definition.
# The actual scheduling is handled by EventBridge (configured separately).
#
# Usage from application repos:
#   uses: your-org/shared-workflows/.github/workflows/reusable-run-ecs-task.yml@main

name: Deploy ECS Task

on:
  workflow_call:
    inputs:
      environment:
        description: "GitHub Environment name (dev, qa, prod)"
        required: true
        type: string
      aws-role-arn:
        description: "IAM role ARN for OIDC assume-role"
        required: true
        type: string
      aws-region:
        description: "AWS region"
        required: true
        type: string
      ecr-repository:
        description: "ECR repository name"
        required: true
        type: string
      image-tag:
        description: "Docker image tag"
        required: true
        type: string
      docker-context:
        description: "Path to Docker build context"
        required: false
        type: string
        default: "."
      task-definition-family:
        description: "Task definition family name"
        required: true
        type: string
      container-name:
        description: "Container name in the task definition"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy task to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.aws-role-arn }}
          aws-region: ${{ inputs.aws-region }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: ${{ inputs.ecr-repository }}
          IMAGE_TAG: ${{ inputs.image-tag }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ${{ inputs.docker-context }}
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ inputs.task-definition-family }} \
            --query taskDefinition \
            --output json > task-definition.json

      - name: Render new image into task definition
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ inputs.container-name }}
          image: ${{ steps.ecr-login.outputs.registry }}/${{ inputs.ecr-repository }}:${{ inputs.image-tag }}

      - name: Register updated task definition
        run: |
          aws ecs register-task-definition \
            --cli-input-json file://${{ steps.render-task-def.outputs.task-definition }}
